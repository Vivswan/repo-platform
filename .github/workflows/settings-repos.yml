# Central settings apply: runs Vivswan/repo-settings-as-code once against
# every managed repository, from this repo. Central targets are the
# settings/repos/<name>.yml files (settings/defaults.yml deep-merged under
# each); in-repo targets (enrolled, adopted repos carrying their own
# .github/settings.yml - the file is the opt-in, no module needed) are
# passed via the action's `repos:` remote mode. A central file for the
# same repository wins. The optional settings-sync module adds push-time
# self-apply via reusable-apply-settings.yml.

name: Settings Repos

on:
  push:
    branches: [main]
    paths: [settings/**]
  schedule:
    # Nightly heal at an offbeat minute.
    - cron: "47 3 * * *"
  workflow_dispatch:
    inputs:
      check_only:
        description: Report drift without writing
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: settings-repos
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      # A missing token is a misconfiguration of this repo: fail loudly.
      # So is a narrowed one here: settings need Administration + Issues
      # write, and unreachable sections fail the run (see
      # on-missing-permission below).
      - name: Require the fleet token
        env:
          PAT: ${{ secrets.REPO_PLATFORM_TOKEN }}
        run: |
          if [ -z "$PAT" ]; then
            echo "::error::settings apply cannot run: the REPO_PLATFORM_TOKEN secret is not set - GITHUB_TOKEN can never hold the Administration write that settings mutation needs. Create a fine-grained PAT for the fleet via https://github.com/settings/personal-access-tokens/new?name=REPO_PLATFORM_TOKEN&description=repo-platform+fleet%3A+push+sync+and+central+settings&contents=write&pull_requests=write&workflows=write&administration=write&issues=write and add it as an Actions secret named REPO_PLATFORM_TOKEN in this repository."
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # In-repo targets: enrolled repos (the fleet token can push - probed,
      # since user/repos' permissions field reflects the USER, not the
      # token), adopted (.repo-platform.yml on the default branch), and
      # carrying their own .github/settings.yml - no module required, the
      # file is the signal. A central settings/repos/<name>.yml wins and
      # drops the repo from the remote list.
      - name: Discover in-repo settings targets
        id: targets
        env:
          GH_TOKEN: ${{ secrets.REPO_PLATFORM_TOKEN }}
          PAT: ${{ secrets.REPO_PLATFORM_TOKEN }}
          OWNER: ${{ github.repository_owner }}
        run: |
          # The implicit runner shell has no pipefail; without it a gh api
          # failure would vanish into jq's success.
          set -o pipefail
          # -F alone would flip gh api to POST; this is a read.
          gh api user/repos --method GET --paginate --slurp -F per_page=100 \
            | jq --arg owner "$OWNER" \
                'add | [.[] | select(.owner.login == $owner and (.archived | not) and .permissions.push) | .full_name]' \
            > "$RUNNER_TEMP/discovered.json"
          bun .github/scripts/repos_registry.ts select \
            --discovered "$RUNNER_TEMP/discovered.json" > "$RUNNER_TEMP/selected.json"

          repos=""
          while IFS=$'\t' read -r repo name; do
            [ -f "settings/repos/$name.yml" ] && continue
            # Enrollment = the token's actual grant, probed via git's
            # push-service advertisement (200 only with push permission;
            # 401/403/404 = no grant). Anything else is a transient or
            # unexpected failure and must not silently drop the repo.
            probe_code="$(curl -s -o /dev/null -w '%{http_code}' \
              -u "x-access-token:${PAT}" \
              "https://github.com/${repo}.git/info/refs?service=git-receive-pack")"
            case "$probe_code" in
              200) ;;
              401 | 403 | 404) continue ;;
              *)
                echo "::error::push-permission probe for $repo failed with HTTP ${probe_code}; not a permission answer, refusing to guess."
                exit 1
                ;;
            esac
            # Only a 404 means "not adopted"; other API failures must not
            # silently drop a repo from this run.
            if ! gh api "repos/$repo/contents/.repo-platform.yml" --silent \
                2>"$RUNNER_TEMP/probe.err"; then
              if grep -q "HTTP 404" "$RUNNER_TEMP/probe.err"; then
                continue  # not adopted
              fi
              echo "::error::adoption check failed for $repo: $(cat "$RUNNER_TEMP/probe.err")"
              exit 1
            fi
            # Same 404-vs-failure split for the settings file itself.
            if ! gh api "repos/$repo/contents/.github/settings.yml" --jq .sha \
                >/dev/null 2>"$RUNNER_TEMP/probe.err"; then
              if grep -q "HTTP 404" "$RUNNER_TEMP/probe.err"; then
                continue  # no in-repo settings; central covers it or nothing does
              fi
              echo "::error::settings.yml check failed for $repo: $(cat "$RUNNER_TEMP/probe.err")"
              exit 1
            fi
            repos="$repos$repo"$'\n'
          done < <(jq -r '.[] | [.repo, .name] | @tsv' "$RUNNER_TEMP/selected.json")

          {
            echo "repos<<REPOS_EOF"
            printf '%s' "$repos"
            echo "REPOS_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "in-repo targets:"
          printf '%s' "$repos"

      - name: Apply repository settings
        # Pinned to an immutable commit; bump to @v1 once repo-settings-as-code
        # cuts its first release. Bump together with reusable-apply-settings.yml.
        uses: Vivswan/repo-settings-as-code@7c023fc1c7e63502d45ee8b17c6bf0db14faf0e8
        with:
          token: ${{ secrets.REPO_PLATFORM_TOKEN }}
          mode: ${{ inputs.check_only && 'check' || 'apply' }}
          repos-dir: settings/repos
          defaults-file: settings/defaults.yml
          repos: ${{ steps.targets.outputs.repos }}
          # Strict: a token that cannot reach a declared section fails the
          # run (the action's default) - settings drift must not hide
          # behind a green run.
          on-missing-permission: fail
