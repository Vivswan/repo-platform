# Applies this repo's own .github/settings.yml via settings-as-code (the
# same machinery downstream repos get from the settings-sync module).

name: Apply Settings

on:
  push:
    branches: [main]
    paths: [.github/settings.yml]
  schedule:
    - cron: "49 5 * * 1"
  workflow_dispatch:
    inputs:
      check_only:
        description: Report drift without writing
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  apply:
    uses: ./.github/workflows/reusable-apply-settings.yml
    with:
      require_token: true
      check_only: ${{ inputs.check_only || false }}
    secrets:
      REPO_PLATFORM_TOKEN: ${{ secrets.REPO_PLATFORM_TOKEN }}
