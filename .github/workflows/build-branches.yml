# Publishes the generated build branches copier consumes:
#   staging -> minimal build tree from the LATEST main commit (every push)
#   latest  -> minimal build tree from the LATEST release, tagged templates/vX.Y.Z
# Both are ORPHAN, APPEND-ONLY branches: each build commit parents the
# previous build commit, never a main commit, so a main history rewrite can
# never invalidate them and old build commits (downstream repos' recorded
# _commit, needed by copier update's three-way merge) stay reachable forever.
# The weekly schedule is a self-heal net: releases published with the default
# GITHUB_TOKEN do not fire the `release` trigger (same caveat as sync-repos).
# GITHUB_TOKEN pushes trigger no workflows - intended; nothing may run on the
# build branches (their trees carry no .github/).

name: Build Branches

on:
  push:
    branches: [main]
  release:
    types: [published]
  schedule:
    - cron: "37 5 * * 1"
  workflow_dispatch:
    inputs:
      channel:
        description: Which build branch(es) to rebuild
        required: false
        type: choice
        options: [both, staging, latest]
        default: both

permissions:
  contents: write

concurrency:
  group: build-branches
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up bun
        uses: oven-sh/setup-bun@v2

      - name: Plan builds
        id: plan
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_CHANNEL: ${{ inputs.channel }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: bash .github/scripts/build-branches/plan.sh

      - name: Build and publish
        if: steps.plan.outputs.staging == 'true' || steps.plan.outputs.latest == 'true'
        env:
          BUILD_STAGING: ${{ steps.plan.outputs.staging }}
          BUILD_LATEST: ${{ steps.plan.outputs.latest }}
          VERSION: ${{ steps.plan.outputs.version }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash .github/scripts/build-branches/publish.sh
