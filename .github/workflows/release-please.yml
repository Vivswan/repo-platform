# Cuts releases via release-please: merging to main accumulates conventional
# commits into a release PR; merging that PR tags vX.Y.Z and publishes the
# GitHub release, which sync-repos pushes to managed repos.
#
# Called by ci.yml's release-please job, downstream of the all-green gate, so
# releases and release-PR refreshes only happen on a green main.
#
# With REPO_PLATFORM_TOKEN (the fleet PAT stored here) the release PR
# triggers CI normally; with the default GITHUB_TOKEN it needs a
# close/reopen to run checks.

name: Release Please

on:
  workflow_call:

# The effective token comes from the calling job; declaring the needs here
# documents them and caps a caller that grants more.
permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # A green run releases only the head it tested: if main moved on, skip
      # and let the newer push's own run release (after its CI passes).
      - name: Check this run tested the current head
        id: head
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          head="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/main" --jq .object.sha)"
          if [ "$head" = "$GITHUB_SHA" ]; then
            echo "current=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::main moved to ${head:0:7} since this run started; the newer run releases"
            echo "current=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: googleapis/release-please-action@v5
        if: steps.head.outputs.current == 'true'
        with:
          token: ${{ secrets.REPO_PLATFORM_TOKEN || github.token }}
