# Reusable template sync: pulls the calling repository's channel of
# repo-platform's generated build branches (latest = templates/vX.Y.Z build
# tags, staging = the staging branch head) via `copier update` and opens a
# PR to itself.
#
# Conflict model: overlapping local edits resolve in the template's favor;
# the dropped local lines land in the PR body, and the run fails so the
# auto-resolution cannot land unreviewed (every re-sync fails the same way
# until the PR is merged).
#
# Token model: uses REPO_PLATFORM_TOKEN when the caller passes it (PR is
# authored by the user and triggers CI normally); falls back to the run's
# GITHUB_TOKEN otherwise (PR is created but CI won't auto-trigger - the PR
# body carries a close/reopen note). GITHUB_TOKEN can never push changes
# under .github/workflows/, so updates touching workflow files require the
# PAT (with Workflows:RW) and fail with instructions without it.

name: Reusable Template Sync

on:
  workflow_call:
    inputs:
      version:
        description: Release to sync to (latest channel only; empty = newest release)
        required: false
        type: string
        default: ""
    secrets:
      REPO_PLATFORM_TOKEN:
        required: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: template-sync-${{ github.repository }}
  cancel-in-progress: false

env:
  TEMPLATE_REPO: Vivswan/repo-platform

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve token mode
        id: token
        env:
          PAT: ${{ secrets.REPO_PLATFORM_TOKEN }}
        run: |
          if [ -n "$PAT" ]; then
            echo "mode=pat" >> "$GITHUB_OUTPUT"
          else
            echo "mode=github-token" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        uses: actions/checkout@v7
        with:
          # Always base the update on the default branch, not the triggering
          # ref - a dispatch from a feature branch must not leak its commits
          # into the automation PR.
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          token: ${{ secrets.REPO_PLATFORM_TOKEN || github.token }}

      - name: Require registration files
        run: |
          test -f .repo-platform.yml || { echo "::error::template sync cannot start: .repo-platform.yml is missing from the default branch, so this repo is not registered with repo-platform. Restore the file from git history, or regenerate the repo with 'copier copy gh:${TEMPLATE_REPO} . --vcs-ref staging' (or a templates/vX.Y.Z tag)"; exit 1; }
          test -f .copier-answers.yml || { echo "::error::template sync cannot start: .copier-answers.yml is missing, so copier has no recorded answers to update from. Restore the file from git history, or regenerate the repo with 'copier copy gh:${TEMPLATE_REPO} . --vcs-ref staging' (or a templates/vX.Y.Z tag)"; exit 1; }

      - name: Determine current and target versions
        id: versions
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED: ${{ inputs.version }}
        run: |
          channel="$(awk '$1 == "channel:" { print $2 }' .copier-answers.yml)"
          channel="${channel:-latest}"
          current="$(awk '$1 == "_commit:" { print $2 }' .copier-answers.yml)"
          # copier's to_nice_yaml quotes ambiguous scalars (a digit-only short
          # sha renders as '1234567'); strip the quotes before comparing.
          current="${current#\'}"; current="${current%\'}"
          current="${current#\"}"; current="${current%\"}"

          if [ "$channel" = "staging" ]; then
            target="$(git ls-remote "https://github.com/${TEMPLATE_REPO}" refs/heads/staging | cut -f1)"
            if [ -z "$target" ]; then
              echo "::error::cannot resolve the staging target: ${TEMPLATE_REPO} has no staging branch, so there is nothing to sync from. Dispatch the Build Branches workflow in ${TEMPLATE_REPO}, then re-run this sync."
              exit 1
            fi
            # The recorded _commit is a git-describe string: either a bare
            # short sha or templates/vX.Y.Z-N-g<short sha>; the trailing
            # -g<sha> (or the whole value) identifies the build commit.
            case "$current" in
              *-g*) cur_sha="${current##*-g}" ;;
              *) cur_sha="$current" ;;
            esac
            if [ -n "$cur_sha" ] && case "$target" in "$cur_sha"*) true ;; *) false ;; esac; then
              up_to_date=true
            else
              up_to_date=false
            fi
            validate_ref="main"
            branch="automation/repo-platform-staging"
            display="staging@${target:0:12}"
          else
            if [ -n "$REQUESTED" ]; then
              ver="${REQUESTED#templates/}"
              ver="v${ver#v}"
            else
              ver="$(gh api "repos/${TEMPLATE_REPO}/releases/latest" --jq .tag_name)"
            fi
            target="templates/${ver}"
            if ! git ls-remote --exit-code "https://github.com/${TEMPLATE_REPO}" "refs/tags/${target}" >/dev/null; then
              echo "::error::cannot sync to ${target}: the tag does not exist in ${TEMPLATE_REPO} because the ${ver} build has not run yet (or failed). Dispatch the Build Branches workflow in ${TEMPLATE_REPO}, then re-run this sync."
              exit 1
            fi
            [ "$current" = "$target" ] && up_to_date=true || up_to_date=false
            # The build tag holds no actions/; validation code lives on main
            # at the release tag of the same version.
            validate_ref="$ver"
            branch="automation/repo-platform-${ver}"
            display="$target"
          fi

          {
            echo "current=${current}"
            echo "target=${target}"
            echo "up_to_date=${up_to_date}"
            echo "validate_ref=${validate_ref}"
            echo "branch=${branch}"
            echo "display=${display}"
          } >> "$GITHUB_OUTPUT"
          if [ "$up_to_date" = "true" ]; then
            echo "Already on ${display}; nothing to do."
          else
            echo "Updating ${current:-<unknown>} -> ${display}"
          fi

      - name: Install copier
        if: steps.versions.outputs.up_to_date == 'false'
        run: pipx install copier

      - name: Create update branch
        if: steps.versions.outputs.up_to_date == 'false'
        env:
          BRANCH: ${{ steps.versions.outputs.branch }}
        run: git checkout -B "$BRANCH"

      - name: Apply copier update
        if: steps.versions.outputs.up_to_date == 'false'
        env:
          TARGET: ${{ steps.versions.outputs.target }}
        run: |
          copier update --vcs-ref "$TARGET" --defaults --trust

      - name: Check out repo-platform for validation
        if: steps.versions.outputs.up_to_date == 'false'
        uses: actions/checkout@v7
        with:
          repository: Vivswan/repo-platform
          # NOT the copier target: build refs carry no actions/. The release
          # tag of the same version (or main, for staging) has the validator.
          ref: ${{ steps.versions.outputs.validate_ref }}
          path: .repo-platform-src

      # Conflicts (local edits overlapping template changes) resolve in the
      # template's favor so the tree stays valid; the dropped local lines go
      # into the PR body and the job fails at the end until reviewed.
      - name: Resolve copier conflicts toward the template
        if: steps.versions.outputs.up_to_date == 'false'
        id: conflicts
        run: |
          python3 .repo-platform-src/.github/scripts/resolve_copier_conflicts.py --summary "$RUNNER_TEMP/dropped-local-hunks.md"
          if [ -s "$RUNNER_TEMP/dropped-local-hunks.md" ]; then
            echo "resolved=true" >> "$GITHUB_OUTPUT"
          else
            echo "resolved=false" >> "$GITHUB_OUTPUT"
          fi

      # A failed validation still opens the PR (that is where a human fixes
      # the tree); the job fails at the end.
      - name: Validate generated files
        if: steps.versions.outputs.up_to_date == 'false'
        id: validate
        run: |
          pip install --quiet pyyaml
          if python3 .repo-platform-src/actions/validate-template/validate_generated_files.py .; then
            echo "result=ok" >> "$GITHUB_OUTPUT"
          else
            echo "result=failed" >> "$GITHUB_OUTPUT"
          fi
          rm -rf .repo-platform-src

      - name: Detect changes
        if: steps.versions.outputs.up_to_date == 'false'
        id: changes
        run: |
          rm -rf .repo-platform-src
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes produced by the update."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # GitHub rejects any push touching .github/workflows/ unless the token
      # carries the workflows permission, which GITHUB_TOKEN can never hold.
      - name: Require a workflow-capable token
        if: steps.versions.outputs.up_to_date == 'false' && steps.changes.outputs.changed == 'true' && steps.token.outputs.mode == 'github-token'
        run: |
          changed_workflows="$(git status --porcelain -- '.github/workflows')"
          [ -z "$changed_workflows" ] && exit 0
          echo "$changed_workflows"
          echo "::error::template sync cannot push this update: it changes the workflow files listed above, and GitHub refuses workflow-file pushes from the default GITHUB_TOKEN. Add a REPO_PLATFORM_TOKEN secret to this repository (fine-grained PAT with Contents:RW, Pull requests:RW, Workflows:RW; create one with the permissions pre-selected at https://github.com/settings/personal-access-tokens/new?name=REPO_PLATFORM_TOKEN&contents=write&pull_requests=write&workflows=write), then re-run the sync."
          exit 1

      - name: Commit and push
        if: steps.versions.outputs.up_to_date == 'false' && steps.changes.outputs.changed == 'true'
        env:
          BRANCH: ${{ steps.versions.outputs.branch }}
          DISPLAY: ${{ steps.versions.outputs.display }}
        run: |
          git config user.name "repo-platform-sync"
          git config user.email "repo-platform-sync@users.noreply.github.com"
          git add --all
          git commit -m "chore: update repo-platform template to ${DISPLAY}"
          # --force: per-version branches are recreated on retries, and the
          # staging channel reuses one rolling branch across builds.
          if ! push_output="$(git push --force origin "$BRANCH" 2>&1)"; then
            echo "$push_output"
            case "$push_output" in
              *"create or update workflow"*)
                echo "::error::push rejected: the REPO_PLATFORM_TOKEN cannot update workflow files. Regenerate the PAT with the Workflows:RW permission, update the secret, then re-run the sync." ;;
            esac
            exit 1
          fi
          echo "$push_output"

      - name: Create or refresh pull request
        if: steps.versions.outputs.up_to_date == 'false' && steps.changes.outputs.changed == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.REPO_PLATFORM_TOKEN || github.token }}
          TARGET: ${{ steps.versions.outputs.target }}
          CURRENT: ${{ steps.versions.outputs.current }}
          DISPLAY: ${{ steps.versions.outputs.display }}
          BRANCH: ${{ steps.versions.outputs.branch }}
          TOKEN_MODE: ${{ steps.token.outputs.mode }}
          VALIDATION: ${{ steps.validate.outputs.result }}
          RESOLVED: ${{ steps.conflicts.outputs.resolved }}
          SUMMARY_FILE: ${{ runner.temp }}/dropped-local-hunks.md
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "$BRANCH" = "automation/repo-platform-staging" ]; then
            source_line="[\`${TEMPLATE_REPO}\`](https://github.com/${TEMPLATE_REPO}/tree/staging) (staging channel)"
          else
            ver="${TARGET#templates/}"
            source_line="[\`${TEMPLATE_REPO}\`](https://github.com/${TEMPLATE_REPO}/releases/tag/${ver})"
          fi

          title="chore: update repo-platform template to ${DISPLAY}"
          body="Automated template update from ${source_line}.

          - Previous: \`${CURRENT}\`
          - New: \`${DISPLAY}\`

          Review any merge conflicts and confirm repository-local sections were preserved before merging."

          if [ "$RESOLVED" = "true" ]; then
            body="${body}

          > [!WARNING]
          > copier hit merge conflicts, resolved below in favor of the
          > template where possible. Restore any dropped local lines that
          > should stay, and hand-edit anything marked unresolved, before
          > merging.

          $(cat "$SUMMARY_FILE")"
          fi

          if [ "$VALIDATION" = "failed" ]; then
            body="${body}

          > [!WARNING]
          > Validation failed on the updated tree (details in the sync run
          > log). Fix it in this PR before merging."
          fi

          if [ "$TOKEN_MODE" = "github-token" ]; then
            body="${body}

          > [!NOTE]
          > Created with the default GITHUB_TOKEN, so CI did not auto-trigger.
          > Close and reopen this PR (or push to the branch) to run checks."
          fi

          existing="$(gh pr list --head "$BRANCH" --json number --jq '.[0].number // empty')"
          if [ -n "$existing" ]; then
            # Rolling staging PRs are force-pushed over; keep title/body honest.
            gh pr edit "$existing" --title "$title" --body "$body"
            echo "PR #${existing} already exists for ${BRANCH}; refreshed."
            url="$(gh pr view "$existing" --json url --jq .url)"
            echo "url=${url}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          url="$(gh pr create \
            --base "$BASE_BRANCH" \
            --head "$BRANCH" \
            --title "$title" \
            --body "$body")"
          echo "Created ${url}"
          echo "url=${url}" >> "$GITHUB_OUTPUT"

      - name: Fail on validation errors
        if: steps.versions.outputs.up_to_date == 'false' && steps.validate.outputs.result == 'failed'
        env:
          PR_URL: ${{ steps.pr.outputs.url }}
        run: |
          if [ -n "$PR_URL" ]; then
            echo "::error::the update was pushed but validation of the resulting tree failed (details in the 'Validate generated files' step log). Fix the tree in ${PR_URL} before merging."
          else
            echo "::error::the update produced no changes, yet validation failed, so the default branch itself does not validate (details in the 'Validate generated files' step log). Fix the tree on the default branch, then re-run the sync."
          fi
          exit 1

      - name: Require review of auto-resolved conflicts
        if: steps.versions.outputs.up_to_date == 'false' && steps.conflicts.outputs.resolved == 'true'
        env:
          PR_URL: ${{ steps.pr.outputs.url }}
        run: |
          echo "::error::copier hit merge conflicts; where possible they were resolved in favor of the template, and the dropped local lines are listed in the PR body and in the 'Resolve copier conflicts' step log. Review ${PR_URL}, restore anything that should stay local, then merge."
          exit 1
