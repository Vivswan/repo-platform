# Reusable settings apply: runs Vivswan/repo-settings-as-code against the calling
# repository's .github/settings.yml. Replaces the Probot Settings app - every
# apply is a visible run that fails loudly instead of drifting silently.
#
# Token model: settings mutation needs Administration (and Issues) write,
# which GITHUB_TOKEN can never hold - the caller passes REPO_PLATFORM_TOKEN
# (fine-grained PAT). Without it the run SKIPS with a notice unless the
# caller sets require_token (repo-platform's own caller does).
# Pinned to an immutable commit sha; switch to @v1 once
# repo-settings-as-code cuts its first release.

name: Reusable Apply Settings

on:
  workflow_call:
    inputs:
      check_only:
        description: Report drift without writing (exit 1 on drift)
        required: false
        type: boolean
        default: false
      require_token:
        description: Fail (instead of skip) when REPO_PLATFORM_TOKEN is absent
        required: false
        type: boolean
        default: false
      on_missing_permission:
        description: fail (default) or warn - partial success on missing permissions
        required: false
        type: string
        default: fail
      required_sections:
        description: Sections that must apply even under warn
        required: false
        type: string
        default: ""
      sections:
        description: Optional allowlist of sections to process
        required: false
        type: string
        default: ""
      api_version:
        description: X-GitHub-Api-Version override
        required: false
        type: string
        default: "2022-11-28"
    secrets:
      REPO_PLATFORM_TOKEN:
        required: false

permissions:
  contents: read

concurrency:
  group: apply-settings-${{ github.repository }}
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve token
        id: token
        env:
          PAT: ${{ secrets.REPO_PLATFORM_TOKEN }}
          REQUIRE: ${{ inputs.require_token }}
        run: |
          if [ -n "$PAT" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          elif [ "$REQUIRE" = "true" ]; then
            echo "::error::settings apply cannot run: the REPO_PLATFORM_TOKEN secret is not set and this caller requires it (require_token: true) - GITHUB_TOKEN can never hold Administration write. Add a fine-grained PAT with Administration (read and write) and Issues (read and write) on this repo as an Actions secret named REPO_PLATFORM_TOKEN."
            exit 1
          else
            echo "::notice::settings apply skipped: the REPO_PLATFORM_TOKEN secret is not set, and GITHUB_TOKEN cannot mutate repo settings. To opt in, add a fine-grained PAT with Administration (read and write) and Issues (read and write) on this repo as an Actions secret named REPO_PLATFORM_TOKEN."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        if: steps.token.outputs.proceed == 'true'
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Apply repository settings
        if: steps.token.outputs.proceed == 'true'
        # Pinned to an immutable commit; bump to @v1 once repo-settings-as-code
        # cuts its first release.
        uses: Vivswan/repo-settings-as-code@34f108a30e5f925e783e17279be8abeadbb42c4d
        with:
          token: ${{ secrets.REPO_PLATFORM_TOKEN }}
          mode: ${{ inputs.check_only && 'check' || 'apply' }}
          on-missing-permission: ${{ inputs.on_missing_permission }}
          required-sections: ${{ inputs.required_sections }}
          sections: ${{ inputs.sections }}
          api-version: ${{ inputs.api_version }}
