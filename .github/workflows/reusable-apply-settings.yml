# Reusable settings apply: runs Vivswan/settings-as-code against the calling
# repository's .github/settings.yml. Replaces the Probot Settings app - every
# apply is a visible run that fails loudly instead of drifting silently.
#
# Token model: settings mutation needs Administration (and Issues) write,
# which GITHUB_TOKEN can never hold - the caller passes REPO_PLATFORM_TOKEN
# (fine-grained PAT). Without it the run SKIPS with a notice unless the
# caller sets require_token (repo-platform's own caller does).
# Pinned @main until settings-as-code cuts v1; switch the pin then.

name: Reusable Apply Settings

on:
  workflow_call:
    inputs:
      check_only:
        description: Report drift without writing (exit 1 on drift)
        required: false
        type: boolean
        default: false
      require_token:
        description: Fail (instead of skip) when REPO_PLATFORM_TOKEN is absent
        required: false
        type: boolean
        default: false
    secrets:
      REPO_PLATFORM_TOKEN:
        required: false

permissions:
  contents: read

concurrency:
  group: apply-settings-${{ github.repository }}
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve token
        id: token
        env:
          PAT: ${{ secrets.REPO_PLATFORM_TOKEN }}
          REQUIRE: ${{ inputs.require_token }}
        run: |
          if [ -n "$PAT" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          elif [ "$REQUIRE" = "true" ]; then
            echo "::error::REPO_PLATFORM_TOKEN is not set; settings cannot be applied (needs Administration + Issues write)"
            exit 1
          else
            echo "::notice::REPO_PLATFORM_TOKEN is not set; settings apply skipped (add the secret to opt in)"
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        if: steps.token.outputs.proceed == 'true'
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Apply repository settings
        if: steps.token.outputs.proceed == 'true'
        uses: Vivswan/settings-as-code@main
        with:
          token: ${{ secrets.REPO_PLATFORM_TOKEN }}
          mode: ${{ inputs.check_only && 'check' || 'apply' }}
          on-missing-permission: fail
