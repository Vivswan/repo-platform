# Reusable settings apply for the IN-REPO settings home: a settings-sync
# module repo's thin caller runs Vivswan/repo-settings-as-code against its
# own .github/settings.yml on push. The central home (settings/repos/ files
# here, plus a remote pass over the module repos) is settings-repos.yml.
# Replaces the Probot Settings app - every apply is a visible run that fails
# loudly instead of drifting silently.
#
# Token model: settings mutation needs Administration (and Issues) write,
# which GITHUB_TOKEN can never hold - the caller passes its own
# REPO_PLATFORM_TOKEN (fine-grained PAT). Without it the run SKIPS with a
# warning; repo-platform's central settings-repos run heals the repo either way.
# Pinned to an immutable commit sha; switch to @v1 once
# repo-settings-as-code cuts its first release.

name: Reusable Apply Settings

on:
  workflow_call:
    inputs:
      check_only:
        description: Report drift without writing (exit 1 on drift)
        required: false
        type: boolean
        default: false
      on_missing_permission:
        description: fail (default) or warn - partial success on missing permissions
        required: false
        type: string
        default: fail
      required_sections:
        description: Sections that must apply even under warn
        required: false
        type: string
        default: ""
      sections:
        description: Optional allowlist of sections to process
        required: false
        type: string
        default: ""
      api_version:
        description: X-GitHub-Api-Version override
        required: false
        type: string
        default: "2022-11-28"
    secrets:
      REPO_PLATFORM_TOKEN:
        required: false

permissions:
  contents: read

concurrency:
  group: apply-settings-${{ github.repository }}
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve token
        id: token
        env:
          PAT: ${{ secrets.REPO_PLATFORM_TOKEN }}
        run: |
          if [ -n "$PAT" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::settings apply skipped: the REPO_PLATFORM_TOKEN secret is not set, and GITHUB_TOKEN cannot mutate repo settings. To opt in to self-apply on push, add a fine-grained PAT with Administration (read and write) and Issues (read and write) on this repo as an Actions secret named REPO_PLATFORM_TOKEN. The central settings-repos run in repo-platform applies this repository's settings either way."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        if: steps.token.outputs.proceed == 'true'
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Apply repository settings
        if: steps.token.outputs.proceed == 'true'
        # Pinned to an immutable commit; bump to @v1 once repo-settings-as-code
        # cuts its first release. Bump together with settings-repos.yml.
        uses: Vivswan/repo-settings-as-code@7c023fc1c7e63502d45ee8b17c6bf0db14faf0e8
        with:
          token: ${{ secrets.REPO_PLATFORM_TOKEN }}
          mode: ${{ inputs.check_only && 'check' || 'apply' }}
          on-missing-permission: ${{ inputs.on_missing_permission }}
          required-sections: ${{ inputs.required_sections }}
          sections: ${{ inputs.sections }}
          api-version: ${{ inputs.api_version }}
