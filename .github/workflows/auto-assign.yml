# Caller of this repo's own reusable auto-assign (local reference).

name: Auto Assign

on:
  workflow_dispatch:
  issues:
    types: [opened]
  pull_request:
    types: [opened, synchronize]
  # Code scanning alerts have no creation trigger for Actions, so assign them
  # after each CI run completes (CodeQL analyzes inside CI's gate), with a
  # weekly cron as a catch-up. The reusable workflow only acts on runs whose
  # triggering event was a default-branch push or a schedule.
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  schedule:
    - cron: "23 6 * * 1"

permissions:
  # CODEOWNERS resolution in the reusable workflow.
  contents: read
  issues: write
  pull-requests: write
  # workflow_dispatch activates the code-scanning-alert assignment job in the
  # reusable workflow (public repo), which needs this.
  security-events: write

jobs:
  auto-assign:
    uses: ./.github/workflows/reusable-auto-assign.yml
