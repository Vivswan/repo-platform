# Reusable PR title check. Callers trigger on pull_request_target; the
# github context (event payload) flows through from the caller.

name: Reusable PR Title

on:
  workflow_call: {}

permissions:
  pull-requests: read

jobs:
  conventional-title:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title is a Conventional Commit
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
