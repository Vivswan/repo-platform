name: CI

on:
  push:
    branches: [main]
  # `edited` on top of the default three: a PR title edit must re-run the
  # gate so the pr-title check stays honest. The cancel-in-progress
  # concurrency below bounds the extra runs.
  pull_request:
    types: [opened, edited, reopened, synchronize]
  workflow_dispatch:
  # Weekly CodeQL re-scan with refreshed query packs; every other gate job
  # is event-agnostic or skips its work cleanly on non-PR events.
  schedule:
    - cron: "23 4 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: raven-actions/actionlint@v2

  # The workflows' large steps live as scripts in .github/scripts/ exactly
  # so they can be linted; actionlint only sees inline run blocks.
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Shellcheck the workflow step scripts
        run: find .github/scripts -name '*.sh' -print0 | xargs -0 shellcheck

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install yamllint
        run: python3 -m pip install --quiet yamllint
      - name: Lint YAML
        run: yamllint -s .

  biome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - name: Install tooling
        run: bun install --frozen-lockfile --silent
      - name: Biome (lint + format check)
        run: bun x biome ci .

  typography:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./actions/check-typography

  commit-names:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: ./actions/validate-commit-names

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - name: Typecheck repo and action scripts
        run: |
          for dir in . actions/check-typography actions/validate-commit-names actions/validate-template; do
            echo "::group::$dir"
            (cd "$dir" && bun install --frozen-lockfile --silent && bun x tsc -p .)
            echo "::endgroup::"
          done

  gitignore-fresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - name: Verify templates/base/.gitignore.jinja matches the lock
        run: bun scripts/build_gitignore.ts --check

  # template/ is no longer committed; prove composition succeeds (collisions,
  # orphan anchors, manifest errors all hard-fail) and is deterministic.
  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile --silent
      - name: Build twice and compare
        run: |
          bun .github/scripts/build-branches/branch_tree.ts --dest /tmp/tree-a --channel staging
          bun .github/scripts/build-branches/branch_tree.ts --dest /tmp/tree-b --channel staging
          diff -r --no-dereference /tmp/tree-a /tmp/tree-b
          echo "build tree is deterministic"

  validate-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: |
          bun install --frozen-lockfile --silent
          bun install --frozen-lockfile --silent --cwd actions/validate-template
      - name: Validate repo-platform against its own conventions
        run: bun actions/validate-template/validate_generated_files.ts --self .
      - name: Validate managed-repos registry
        run: bun .github/scripts/fleet/repos_registry.ts validate

  script-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile --silent
      - name: Run .github/scripts tests
        run: bun test ./.github/scripts

  smoke-generate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Module combos covering the risky branches. `modules` is a YAML
          # STRING here (quoted) and parsed by copier as a YAML list.
          - name: everything
            modules: "[agents, bun, uv, pages, release-please, issue-templates, pr-title, auto-assign, settings-sync]"
            private: "false"
            expect_in_pages: |
              setup: bun,uv
              bun install --frozen-lockfile
              bun run build
          - name: bun-typical
            modules: "[agents, bun, release-please, issue-templates, pr-title, auto-assign, settings-sync]"
            private: "false"
          - name: uv-pages-private
            modules: "[uv, pages, auto-assign]"
            private: "true"
            expect_in_pages: |
              uv sync
              uv run mkdocs build --site-dir dist
          - name: pages-bare
            modules: "[pages, auto-assign]"
            private: "false"
            extra_data: "-d pages_setup=none -d pages_build_command=./build.sh -d pages_production=main -d channel=staging"
            expect_in_pages: |
              ./build.sh
              production: main
              staging: false
          # Proves the declared _min_copier_version still supports the
          # multiselect + when features the template uses (serialized
          # multiselect answers landed in copier 9.8.0).
          - name: none
            modules: "[]"
            private: "false"
            copier_spec: "copier==9.8.0"
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      # copier invokes migrations/run.ts with bun during copy/update.
      - uses: oven-sh/setup-bun@v2
      - name: Install copier
        env:
          COPIER_SPEC: ${{ matrix.copier_spec || 'copier' }}
        run: pipx install "$COPIER_SPEC"
      - name: Generate ${{ matrix.name }}
        env:
          MODULES: ${{ matrix.modules }}
          PRIVATE: ${{ matrix.private }}
          EXTRA_DATA: ${{ matrix.extra_data }}
        run: .github/scripts/ci/smoke_generate.sh
      - name: Validate generated output
        run: |
          bun install --frozen-lockfile --silent --cwd actions/validate-template
          bun actions/validate-template/validate_generated_files.ts /tmp/smoke
      - name: Verify module/visibility gating
        env:
          MODULES: ${{ matrix.modules }}
          PRIVATE: ${{ matrix.private }}
          EXPECT_IN_PAGES: ${{ matrix.expect_in_pages }}
          EXTRA_DATA: ${{ matrix.extra_data }}
        run: .github/scripts/ci/verify_smoke_gating.sh
      # Rendered workflows are invisible to the repo-level actionlint job
      # (.jinja files are not YAML pre-render), so lint the smoke output.
      - name: actionlint rendered workflows
        run: |
          bash <(curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color /tmp/smoke/.github/workflows/*.yml

  # Generate from the previous build tag, then `copier update` to a fresh
  # build - the path every managed repo takes (details in the script).
  upgrade-path:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      # copier invokes migrations/run.ts with bun during copy/update.
      - uses: oven-sh/setup-bun@v2
      # pyyaml: the synthetic old-fixture tree is built with the pre-port
      # python composer pinned inside the script; both go away once a real
      # templates/v* release tag exists.
      - name: Install copier + pyyaml
        run: |
          pipx install copier
          python3 -m pip install --quiet pyyaml
      - name: Update from previous build tag to a fresh build
        run: .github/scripts/ci/upgrade_path_test.sh

  # Conventional Commit PR title, checked inside the gate so branch
  # protection blocks on it. The skip lives on the STEP, not the job:
  # all-green treats a skipped needed job as failure, and CI also runs on
  # push/dispatch/schedule events.
  pr-title:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Validate PR title is a Conventional Commit
        if: github.event_name == 'pull_request'
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # CodeQL runs inside the gate: this thin job calls the analysis workflow,
  # and a caller job's permissions are the ceiling for every job in the
  # called workflow, so the scan permissions are granted here. This repo is
  # TypeScript-only (the actions, scripts, and template tooling), so one
  # language leg suffices; the name matches the template's per-language jobs.
  codeql-javascript:
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: ./.github/workflows/reusable-codeql.yml
    with:
      language: javascript-typescript

  all-green:
    name: all-green
    if: always()
    needs:
      - actionlint
      - shellcheck
      - yamllint
      - biome
      - typography
      - commit-names
      - typecheck
      - gitignore-fresh
      - compose
      - validate-template
      - script-tests
      - smoke-generate
      - upgrade-path
      - pr-title
      - codeql-javascript
    runs-on: ubuntu-latest
    steps:
      - name: All jobs green
        env:
          RESULTS: ${{ join(needs.*.result, ' ') }}
        run: |
          echo "results: $RESULTS"
          for result in $RESULTS; do
            if [ "$result" != "success" ]; then
              echo "::error::all-green failed: at least one required job did not succeed (results: $RESULTS). Open the failing job's log in this run, fix the failure, and push again."
              exit 1
            fi
          done

  # Release from a green main only: release-please runs downstream of
  # all-green (in release-please.yml, via workflow_call), so a red commit can
  # never cut a release or refresh the release PR. Deliberately NOT in
  # all-green's needs: it depends on the gate, it is not gated by it. Only
  # push/dispatch runs release: pull requests must never reach it, and the
  # weekly scheduled CodeQL re-scan has no business refreshing release state.
  release-please:
    needs: [all-green]
    if: >-
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
    uses: ./.github/workflows/release-please.yml
    secrets: inherit
