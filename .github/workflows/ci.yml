name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Download actionlint
        run: bash <(curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
      - name: Lint workflows
        run: ./actionlint -color

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install yamllint
        run: pip install --quiet yamllint
      - name: Lint YAML
        run: yamllint -s .

  biome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - name: Install tooling
        run: bun install --frozen-lockfile --silent
      - name: Biome (lint + format check)
        run: bun x biome ci .

  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - name: Ruff lint
        run: uvx ruff check .
      - name: Ruff format check
        run: uvx ruff format --check .

  ty:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - name: Type check Python scripts
        run: uvx --with pyyaml ty check .

  typography:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./actions/check-typography

  commit-names:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: ./actions/validate-commit-names

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - name: Typecheck action scripts
        run: |
          for dir in actions/check-typography actions/validate-commit-names; do
            echo "::group::$dir"
            (cd "$dir" && bun install --frozen-lockfile --silent && bun x tsc -p .)
            echo "::endgroup::"
          done

  gitignore-fresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify templates/base/.gitignore.jinja matches the lock
        run: python3 scripts/build_gitignore.py --check

  # template/ is no longer committed; prove composition succeeds (collisions,
  # orphan anchors, manifest errors all hard-fail) and is deterministic.
  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install pyyaml
        run: pip install --quiet pyyaml
      - name: Build twice and compare
        run: |
          python3 .github/scripts/build_branch_tree.py --dest /tmp/tree-a --channel staging
          python3 .github/scripts/build_branch_tree.py --dest /tmp/tree-b --channel staging
          diff -r --no-dereference /tmp/tree-a /tmp/tree-b
          echo "build tree is deterministic"

  validate-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install pyyaml
        run: pip install --quiet pyyaml
      - name: Validate repo-platform against its own conventions
        run: python3 actions/validate-template/validate_generated_files.py --self .
      - name: Validate managed-repos registry
        run: python3 .github/scripts/validate_repos_registry.py

  smoke-generate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Module combos covering the risky branches. `modules` is a YAML
          # STRING here (quoted) and parsed by copier as a YAML list.
          - name: everything
            modules: "[agents, bun, uv, pages, release-please, issue-templates, pr-title, auto-assign, settings-sync]"
            private: "false"
            expect_in_pages: |
              bun install --frozen-lockfile
              bun run build
          - name: bun-typical
            modules: "[agents, bun, release-please, issue-templates, pr-title, auto-assign, settings-sync]"
            private: "false"
          - name: uv-pages-private
            modules: "[uv, pages, auto-assign]"
            private: "true"
            expect_in_pages: |
              uv sync
              uv run mkdocs build --site-dir dist
          - name: pages-bare
            modules: "[pages, auto-assign]"
            private: "false"
            extra_data: "-d pages_setup=none -d pages_build_command=./build.sh -d pages_production=main -d channel=staging"
            expect_in_pages: |
              ./build.sh
              production: main
              staging: false
          # Proves the declared _min_copier_version still supports the
          # multiselect + when features the template uses (serialized
          # multiselect answers landed in copier 9.8.0).
          - name: none
            modules: "[]"
            private: "false"
            copier_spec: "copier==9.8.0"
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install copier + pyyaml
        env:
          COPIER_SPEC: ${{ matrix.copier_spec || 'copier' }}
        run: |
          pipx install "$COPIER_SPEC"
          pip install --quiet pyyaml
      - name: Generate ${{ matrix.name }}
        env:
          MODULES: ${{ matrix.modules }}
          PRIVATE: ${{ matrix.private }}
          EXTRA_DATA: ${{ matrix.extra_data }}
        run: .github/scripts/smoke_generate.sh
      - name: Validate generated output
        run: python3 actions/validate-template/validate_generated_files.py /tmp/smoke
      - name: Verify module/visibility gating
        env:
          MODULES: ${{ matrix.modules }}
          PRIVATE: ${{ matrix.private }}
          EXPECT_IN_PAGES: ${{ matrix.expect_in_pages }}
          EXTRA_DATA: ${{ matrix.extra_data }}
        run: .github/scripts/verify_smoke_gating.sh
      # Rendered workflows are invisible to the repo-level actionlint job
      # (.jinja files are not YAML pre-render), so lint the smoke output.
      - name: actionlint rendered workflows
        run: |
          bash <(curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color /tmp/smoke/.github/workflows/*.yml

  # Generate from the previous build tag, then `copier update` to a fresh
  # build - the path every managed repo takes (details in the script).
  upgrade-path:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install copier + pyyaml
        run: |
          pipx install copier
          pip install --quiet pyyaml
      - name: Update from previous build tag to a fresh build
        run: .github/scripts/upgrade_path_test.sh

  all-green:
    name: all-green
    if: always()
    needs:
      - actionlint
      - yamllint
      - biome
      - ruff
      - ty
      - typography
      - commit-names
      - typecheck
      - gitignore-fresh
      - compose
      - validate-template
      - smoke-generate
      - upgrade-path
    runs-on: ubuntu-latest
    steps:
      - name: All jobs green
        env:
          RESULTS: ${{ join(needs.*.result, ' ') }}
        run: |
          echo "results: $RESULTS"
          for result in $RESULTS; do
            if [ "$result" != "success" ]; then
              echo "::error::all-green failed: at least one required job did not succeed (results: $RESULTS). Open the failing job's log in this run, fix the failure, and push again."
              exit 1
            fi
          done
