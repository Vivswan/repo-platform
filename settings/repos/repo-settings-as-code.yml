---
# Central settings for Vivswan/repo-settings-as-code, applied by the
# settings-repos workflow (this repo's settings moved here from its own
# .github/settings.yml). settings/defaults.yml is deep-merged under this
# file (this file wins; arrays replace). Undeclared labels are deleted;
# undeclared rulesets are left alone. Schema: Probot settings.yml superset
# (see repo-settings-as-code README).

repository:
  description: "GitHub Action applying declarative repository settings: rulesets, labels, branch protection, and more. A loud, stateless Probot Settings replacement."
  topics: github-action, repository-settings, settings-as-code, configuration-as-code, probot-settings, rulesets, branch-protection, labels

labels:
  - name: dependencies
    color: "0366d6"
    description: Dependency updates
  - name: bug
    color: "d73a4a"
    description: Something isn't working
  - name: enhancement
    color: "a2eeef"
    description: New feature or request
  - name: fix-lint
    color: "fbca04"
    description: Lint / formatting fixes
  # release-please manages these two; listing them here keeps the settings
  # sync from deleting them (it removes any label not declared in this file).
  - name: "autorelease: pending"
    color: "ededed"
    description: release-please release PR awaiting merge/tag
  - name: "autorelease: tagged"
    color: "ededed"
    description: release-please release PR has been tagged

# Branch ruleset for the default branch. Admins (RepositoryRole id 5) are in
# the bypass list, so direct pushes to main still work. The single required
# status check is `all-green` (ci.yml), which `needs:` every CI job except
# the downstream release job - the list stays stable when jobs are added or
# renamed.
rulesets:
  - name: main
    target: branch
    enforcement: active
    conditions:
      ref_name:
        include:
          - "~DEFAULT_BRANCH"
        exclude: []
    rules:
      - type: deletion
      - type: non_fast_forward
      - type: required_linear_history
      - type: required_status_checks
        parameters:
          strict_required_status_checks_policy: false
          do_not_enforce_on_create: true
          required_status_checks:
            - context: all-green
      - type: code_scanning
        parameters:
          code_scanning_tools:
            - tool: CodeQL
              security_alerts_threshold: high_or_higher
              alerts_threshold: errors
      - type: pull_request
        parameters:
          required_approving_review_count: 0
          dismiss_stale_reviews_on_push: false
          # Require an approving review from a CODEOWNER before merge.
          # Admins in bypass_actors can still merge without one.
          require_code_owner_review: true
          require_last_push_approval: false
          required_review_thread_resolution: false
          # Squash-only merges (enforced by the ruleset, not just repo settings).
          allowed_merge_methods:
            - squash
      # Automatically request Copilot code review on PRs to main, including on
      # each new push and on draft PRs.
      - type: copilot_code_review
        parameters:
          review_on_push: true
          review_draft_pull_requests: true
    bypass_actors:
      - actor_id: 5
        actor_type: RepositoryRole
        bypass_mode: always

  # vX.Y.Z release tags are immutable: repo-platform's push sync pins
  # against them and release artifacts reference them. The bare moving
  # major tag (v1) is deliberately NOT matched; the release workflow
  # force-moves it.
  - name: release-tags
    target: tag
    enforcement: active
    conditions:
      ref_name:
        include:
          - v*.*.*
        exclude: []
    rules:
      - type: deletion
      - type: non_fast_forward
      - type: update
