# Fleet config for the push sync: which repos, which channel.
# Validated and resolved by .github/scripts/repos_registry.ts.
#
# - managed: owner/name slugs, or one quoted "*" wildcard. The wildcard
#   auto-discovers every owned, non-archived repo the PAT can see
#   (quoted because a bare * is YAML alias syntax).
# - exclude: discovered repos that must NOT be synced (opt-outs).
# - Channel precedence: config.<repo>.channel > defaults.channel > the
#   repo's recorded copier answer.
# - Modules are NOT fleet config: each repo selects them in its own
#   .repo-platform.yml.
# - Settings home: settings/repos/<name>.yml here (central) or the
#   repo's own .github/settings.yml (settings-sync module).

managed:
  - "*"

exclude: []

# Fleet defaults - what auto-discovered repos use without a config entry.
defaults:
  channel: staging

# Per-repo overrides of the defaults.
config:
  Vivswan/repo-settings-as-code:
    channel: staging
