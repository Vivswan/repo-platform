# Shared Python lint/format config (build_gitignore, validator, migrations).
line-length = 100
target-version = "py310"

[lint]
select = [
    "E4", # imports
    "E7", # statement style
    "E9", # runtime errors
    "F",  # pyflakes
    "I",  # import sorting
    "UP", # pyupgrade
    "B",  # bugbear
]
